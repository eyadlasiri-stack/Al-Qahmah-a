<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية القحمة الرياضية | النظام الإداري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d5a;
            --accent-gold: #ffd700;
            --white: #ffffff;
            --header-height: 180px; /* تحديد ارتفاع ثابت للهيدر لمنع التداخل */
        }

        /* منع الصفحة كاملة من التحرك وتثبيت العناصر */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* --- الهيدر الثابت (الطبقة العلوية) --- */
        .main-header {
            background: linear-gradient(180deg, var(--primary-blue) 0%, #001a35 100%);
            color: white;
            text-align: center;
            padding: 15px 10px;
            flex-shrink: 0; /* يمنع الهيدر من الانضغاط */
            border-bottom: 4px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2000;
        }

        .main-header img {
            width: 70px;
            height: auto;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .main-header h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 900;
        }

        /* شريط المعلومات */
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .location-text { color: var(--accent-gold); font-weight: bold; }

        #save-status {
            font-size: 11px;
            color: #4ade80;
            height: 14px;
            margin-top: 4px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
        }

        /* --- منطقة الجدول (الطبقة المتحركة) --- */
        .content-area {
            flex-grow: 1;
            overflow: auto; /* يسمح بالتحرك هنا فقط */
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 900px;
        }

        /* تثبيت العناوين داخل منطقة الجدول */
        thead th {
            position: sticky;
            top: 0; /* تثبيت في قمة منطقة المحتوى */
            background-color: #ffffff;
            color: var(--primary-blue);
            padding: 15px 5px;
            font-size: 14px;
            font-weight: 900;
            border-bottom: 2px solid #ddd;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 0;
            background: white;
        }

        input {
            width: 100%;
            height: 48px;
            border: none;
            padding: 0 8px;
            text-align: center;
            font-size: 14px;
            font-family: 'Cairo';
            background: transparent;
            outline: none;
        }

        input:focus {
            background: #fffdf0;
            border-bottom: 3px solid var(--primary-blue);
        }

        .num-col {
            background: #f8fafc;
            width: 40px;
            font-weight: bold;
            color: var(--primary-blue);
            text-align: center;
        }

        tr:hover td { background-color: #f8fbff; }

        /* تعديلات الجوال */
        @media (max-width: 600px) {
            .main-header img { width: 55px; }
            .main-header h1 { font-size: 18px; }
            thead th { font-size: 12px; padding: 10px 2px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <img src="https://i.ibb.co/QF1mKFpn/IMG-8418.png" alt="Logo">
        <h1>أكاديمية القحمة الرياضية</h1>
        
        <div class="info-bar">
            <div class="info-item">📍 <span class="location-text">ملعب الخيرية بالقحمة</span></div>
            <div class="info-item">⏰ <span id="clock">00:00:00</span></div>
            <div class="info-item">☀️ <span>28°C صافي</span></div>
        </div>

        <div id="save-status">✓ تم الحفظ تلقائياً</div>
    </header>

    <main class="content-area">
        <table id="playersTable">
            <thead>
                <tr>
                    <th style="width: 40px;">م</th>
                    <th>اسم اللاعب</th>
                    <th>التاريخ</th>
                    <th>الرسوم</th>
                    <th>المرحلة</th>
                    <th>الحالة</th>
                    <th>الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </main>

    <script>
        const tableBody = document.getElementById('tableBody');
        const saveStatus = document.getElementById('save-status');
        const STORAGE_KEY = 'ALQAHMA_FINAL_ULTRA_V1';

        // توليد الصفوف
        function init() {
            let html = '';
            for (let i = 1; i <= 100; i++) {
                html += `
                    <tr>
                        <td class="num-col">${i}</td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                    </tr>
                `;
            }
            tableBody.innerHTML = html;
            load();
            startClock();
        }

        function startClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA');
            }, 1000);
        }

        let timer;
        function save() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                const data = [];
                tableBody.querySelectorAll('tr').forEach(row => {
                    const vals = Array.from(row.querySelectorAll('input')).map(i => i.value);
                    if (vals.some(v => v.trim() !== "")) data.push(vals);
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                saveStatus.style.opacity = "1";
                setTimeout(() => { saveStatus.style.opacity = "0"; }, 1000);
            }, 500);
        }

        function load() {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (saved) {
                const rows = tableBody.querySelectorAll('tr');
                saved.forEach((rowData, index) => {
                    if (rows[index]) {
                        const inputs = rows[index].querySelectorAll('input');
                        rowData.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                    }
                });
            }
        }

        init();
    </script>
</body>
</html>
