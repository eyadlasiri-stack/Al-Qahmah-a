<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية القحمة - حفظ تلقائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #0056b3;
            --bg-light: #f4f9ff;
            --white: #ffffff;
            --save-green: #28a745;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1350px;
            margin: auto;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            border-top: 10px solid var(--primary-blue);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .header h1 { color: var(--primary-blue); margin: 0; font-size: 26px; }

        /* مؤشر الحفظ التلقائي */
        #autoSaveStatus {
            font-size: 14px;
            color: var(--save-green);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .table-wrapper {
            max-height: 75vh;
            overflow-y: auto;
            border: 2px solid #eee;
            border-radius: 10px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }

        thead th {
            position: sticky;
            top: 0;
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 10px;
            z-index: 100;
            border: 1px solid #00264d;
        }

        td { border: 1px solid #eee; padding: 0; }

        input {
            width: 100%;
            height: 48px;
            border: none;
            padding: 0 10px;
            text-align: center;
            font-size: 15px;
            font-family: 'Cairo';
            background-color: transparent;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            background-color: #fffde7;
            border-bottom: 3px solid var(--accent-blue);
        }

        tr:hover { background-color: #f1f7ff; }

        .footer-controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo';
            color: white;
            background-color: var(--primary-blue);
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        .hint { color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>أكاديمية القحمة الرياضية</h1>
        <div id="autoSaveStatus">✓ تم الحفظ تلقائياً</div>
    </div>

    <div class="table-wrapper">
        <table id="playersTable">
            <thead>
                <tr>
                    <th style="width: 45px;">م</th>
                    <th>اسم اللاعب</th>
                    <th>تاريخ التسليم</th>
                    <th>الرسوم</th>
                    <th>المرحلة الدراسية</th>
                    <th>الحالة الصحية</th>
                    <th>رقم الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-controls">
        <button onclick="exportToExcel()">📊 تصدير إلى Excel</button>
        <p class="hint">ميزة الحفظ التلقائي مفعلة. بياناتك في أمان.</p>
    </div>
</div>

<script>
    const tableBody = document.getElementById('tableBody');
    const autoSaveStatus = document.getElementById('autoSaveStatus');

    // 1. توليد الصفوف وإضافة ميزة الحفظ عند الكتابة
    function generateRows() {
        let rowsHtml = '';
        for (let i = 1; i <= 100; i++) {
            rowsHtml += `
                <tr>
                    <td style="background:#f9f9f9; font-weight:bold; text-align:center; color:#003366;">${i}</td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                </tr>
            `;
        }
        tableBody.innerHTML = rowsHtml;
    }

    // 2. دالة الحفظ التلقائي
    let saveTimeout;
    function autoSave() {
        // نستخدم Timeout عشان ما يثقل المتصفح مع كل حرف، يحفظ بعد التوقف عن الكتابة بـ 500ms
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const rows = document.querySelectorAll('#tableBody tr');
            const allData = [];
            
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const rowData = Array.from(inputs).map(input => input.value);
                if (rowData.some(val => val.trim() !== "")) {
                    allData.push(rowData);
                }
            });

            localStorage.setItem('qahmah_auto_save', JSON.stringify(allData));
            
            // إظهار رسالة "تم الحفظ"
            autoSaveStatus.style.opacity = "1";
            setTimeout(() => { autoSaveStatus.style.opacity = "0"; }, 1500);
            
            console.log("Data Auto-Saved");
        }, 500);
    }

    // 3. تحميل البيانات عند فتح الصفحة
    window.onload = function() {
        generateRows();
        const saved = JSON.parse(localStorage.getItem('qahmah_auto_save'));
        if (saved) {
            const rows = document.querySelectorAll('#tableBody tr');
            saved.forEach((rowData, index) => {
                if (rows[index]) {
                    const inputs = rows[index].querySelectorAll('input');
                    rowData.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                }
            });
        }
    };

    // 4. تصدير Excel
    function exportToExcel() {
        let table = document.getElementById("playersTable");
        let template = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" lang="ar"><head><meta charset="utf-8"><style>table{direction:rtl; border:1px solid #ccc;} th{background:#003366; color:#fff;} td{border:1px solid #eee; text-align:center;}</style></head><body>${table.outerHTML}</body></html>`;
        let url = 'data:application/vnd.ms-excel;charset=utf-8,' + encodeURIComponent(template);
        let link = document.createElement("a");
        link.href = url;
        link.download = "كشف_اكاديمية_القحمة_الرياضية.xls";
        link.click();
    }
</script>

</body>
</html>
