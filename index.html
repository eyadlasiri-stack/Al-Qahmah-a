<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>أكاديمية القحمة الرياضية | النظام الإداري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d5a;
            --accent-gold: #ffd700;
            --border-light: #e2e8f0;
            --white: #ffffff;
        }

        /* تثبيت الهيكل ومنع الحركة الجانبية */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Cairo', sans-serif;
            background-color: #ffffff;
        }

        body { display: flex; flex-direction: column; }

        /* الهيدر العلوي الثابت */
        .header-fixed {
            background: linear-gradient(180deg, var(--primary-blue) 0%, #001a35 100%);
            color: white;
            text-align: center;
            padding: 10px;
            flex-shrink: 0;
            z-index: 2000;
            border-bottom: 3px solid var(--accent-gold);
        }

        .header-fixed img { width: 65px; height: auto; margin-bottom: 5px; }
        .header-fixed h1 { font-size: 20px; margin: 0; font-weight: 900; }

        .info-strip {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
            font-size: 11px;
            opacity: 0.9;
        }

        .location { color: var(--accent-gold); font-weight: bold; }

        #save-notify {
            font-size: 11px;
            color: #4ade80;
            height: 14px;
            margin-top: 3px;
            opacity: 0;
            transition: 0.3s;
        }

        /* منطقة المحتوى المتحركة */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto; /* تحريك عمودي فقط */
            overflow-x: hidden; /* منع التحريك الجانبي نهائياً */
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* توزيع الأعمدة بدقة داخل العرض المتاح */
        }

        /* العناوين ثابتة تحت الهيدر مباشرة */
        thead th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            color: var(--primary-blue);
            padding: 12px 2px;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 2px solid var(--border-light);
            z-index: 1000;
        }

        /* تصميم المربعات الخفيف والجميل */
        td {
            border: 1px solid #f1f5f9; /* حدود خفيفة جداً */
            padding: 0;
            background: white;
        }

        input {
            width: 100%;
            height: 45px;
            border: none;
            padding: 0 5px;
            text-align: center;
            font-size: 14px;
            font-family: 'Cairo';
            background: transparent;
            outline: none;
            color: #334155;
            transition: 0.2s;
        }

        input:focus {
            background-color: #fffdf5;
            border-bottom: 2px solid var(--primary-blue);
        }

        .m-num {
            background: #fdfdfd;
            width: 35px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 12px;
        }

        tr:hover td { background-color: #fcfdfe; }

        /* تعديلات الجوال لضمان عدم وجود "لف يمين يسار" */
        @media (max-width: 600px) {
            thead th { font-size: 10px; padding: 8px 1px; }
            input { font-size: 12px; height: 40px; }
            .m-num { width: 25px; }
        }
    </style>
</head>
<body>

    <header class="header-fixed">
        <img src="https://i.ibb.co/QF1mKFpn/IMG-8418.png" alt="Logo">
        <h1>أكاديمية القحمة الرياضية</h1>
        
        <div class="info-strip">
            <div>📍 <span class="location">ملعب الخيرية بالقحمة</span></div>
            <div>⏰ <span id="live-time">00:00:00</span></div>
            <div>☀️ <span>صافي 28°C</span></div>
        </div>

        <div id="save-notify">✓ تم الحفظ</div>
    </header>

    <main class="scroll-area">
        <table id="playersTable">
            <thead>
                <tr>
                    <th style="width: 35px;">م</th>
                    <th>الاسم</th>
                    <th>التاريخ</th>
                    <th>الرسوم</th>
                    <th>المرحلة</th>
                    <th>الحالة</th>
                    <th>الجوال</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                </tbody>
        </table>
    </main>

    <script>
        const dataBody = document.getElementById('dataBody');
        const saveNotify = document.getElementById('save-notify');
        const DB_KEY = 'ALQAHMA_ULTRA_STABLE_V1';

        function init() {
            let rows = '';
            for (let i = 1; i <= 100; i++) {
                rows += `
                    <tr>
                        <td class="m-num">${i}</td>
                        <td><input type="text" oninput="autoSave()"></td>
                        <td><input type="text" oninput="autoSave()"></td>
                        <td><input type="text" oninput="autoSave()"></td>
                        <td><input type="text" oninput="autoSave()"></td>
                        <td><input type="text" oninput="autoSave()"></td>
                        <td><input type="text" oninput="autoSave()"></td>
                    </tr>
                `;
            }
            dataBody.innerHTML = rows;
            loadData();
            updateClock();
        }

        function updateClock() {
            setInterval(() => {
                document.getElementById('live-time').innerText = new Date().toLocaleTimeString('ar-SA');
            }, 1000);
        }

        let debounce;
        function autoSave() {
            clearTimeout(debounce);
            debounce = setTimeout(() => {
                const data = [];
                dataBody.querySelectorAll('tr').forEach(row => {
                    const vals = Array.from(row.querySelectorAll('input')).map(i => i.value);
                    if (vals.some(v => v.trim() !== "")) data.push(vals);
                });
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                saveNotify.style.opacity = "1";
                setTimeout(() => saveNotify.style.opacity = "0", 800);
            }, 500);
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem(DB_KEY));
            if (saved) {
                const rows = dataBody.querySelectorAll('tr');
                saved.forEach((rowData, index) => {
                    if (rows[index]) {
                        const inputs = rows[index].querySelectorAll('input');
                        rowData.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                    }
                });
            }
        }

        init();
    </script>
</body>
</html>
