<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية القحمة | النظام الإداري المعتمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d5a;
            --accent-gold: #ffd700;
            --whatsapp-green: #25D366;
            --filled-green: #e8f5e9;
            --bg-color: #f4f7fb;
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; 
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
        }

        body { display: flex; flex-direction: column; }

        /* الهيدر الثابت */
        .main-header {
            background: linear-gradient(180deg, var(--primary-blue) 0%, #001a35 100%);
            color: white; text-align: center; padding: 12px 10px;
            flex-shrink: 0; z-index: 2000; border-bottom: 3px solid var(--accent-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .main-header img { width: 70px; height: auto; margin-bottom: 4px; }
        .main-header h1 { font-size: 20px; margin: 0; font-weight: 900; }

        .info-row { display: flex; justify-content: center; gap: 15px; margin-top: 6px; font-size: 11px; }
        .loc { color: var(--accent-gold); font-weight: bold; }

        #save-tag { font-size: 11px; color: #4ade80; height: 14px; margin-top: 4px; font-weight: bold; opacity: 0; transition: opacity 0.4s ease; }

        /* منطقة التمرير */
        .scroll-container { 
            flex-grow: 1; 
            overflow: auto; 
            width: 100%; 
            -webkit-overflow-scrolling: touch; 
        }

        table { border-collapse: separate; border-spacing: 0; min-width: 1050px; background: white; }

        /* العناوين العلوية الثابتة */
        thead th {
            position: sticky; top: 0; background: #ffffff; color: var(--primary-blue);
            padding: 14px 8px; font-size: 14px; font-weight: 900;
            border-bottom: 2px solid #e2e8f0; z-index: 1000;
        }

        /* تثبيت تقاطع العناوين مع الأرقام */
        thead th:first-child {
            position: sticky; right: 0; z-index: 1500;
            background: #ffffff; border-left: 2px solid var(--primary-blue);
            box-shadow: -3px 0 6px rgba(0,0,0,0.05);
        }

        td { border-bottom: 1px solid #edf2f7; border-left: 1px solid #edf2f7; padding: 0; }

        input {
            width: 100%; height: 50px; border: none; padding: 0 8px;
            text-align: center; font-size: 14px; font-family: 'Cairo';
            outline: none; background: transparent; 
            transition: background-color 0.2s ease;
        }

        input.has-content { background-color: var(--filled-green); }
        input:focus { background: #fffdf2 !important; border-bottom: 2px solid var(--primary-blue); }

        /* جدار الأرقام الثابت */
        .index-cell {
            background: #f1f5f9; width: 45px; font-weight: 900; font-size: 15px;
            color: var(--primary-blue); text-align: center;
            position: sticky; right: 0; z-index: 800;
            border-left: 2px solid var(--primary-blue); 
            box-shadow: -3px 0 6px rgba(0,0,0,0.05);
        }

        /* زر الواتساب العائم */
        .whatsapp-btn {
            position: fixed; bottom: 25px; left: 20px;
            background-color: var(--whatsapp-green);
            color: white; border: none; padding: 12px 22px; 
            border-radius: 50px; font-family: 'Cairo'; font-size: 14px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
            z-index: 9999; display: flex; align-items: center; gap: 8px; text-decoration: none;
            transition: transform 0.2s ease;
        }

        .whatsapp-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <header class="main-header">
        <img src="https://i.ibb.co/QF1mKFpn/IMG-8418.png" alt="Logo">
        <h1>أكاديمية القحمة الرياضية</h1>
        <div class="info-row">
            <div>📍 <span class="loc">ملعب الخيرية بالقحمة</span></div>
            <div>⏰ <span id="clock">00:00:00</span></div>
            <div>☀️ <span>صافي 28°C</span></div>
        </div>
        <div id="save-tag">✓ تم الحفظ للأبد في هذا الجهاز</div>
    </header>

    <main class="scroll-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th style="width: 45px;">م</th>
                    <th>الاسم الكامل</th>
                    <th>التاريخ</th>
                    <th>الرسوم</th>
                    <th>المرحلة</th>
                    <th>الحالة</th>
                    <th>رقم الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </main>

    <a href="#" class="whatsapp-btn" onclick="sendToWhatsApp()">
        <span>🟢 حفظ نسخة للواتساب</span>
    </a>

    <script>
        const tableBody = document.getElementById('tableBody');
        const saveTag = document.getElementById('save-tag');
        
        // المفتاح الذهبي
        const DB_KEY = 'ALQAHMA_PERMANENT_DB_FINAL_V2'; 

        function init() {
            let rows = '';
            for (let i = 1; i <= 100; i++) {
                rows += `
                    <tr>
                        <td class="index-cell">${i}</td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                    </tr>
                `;
            }
            tableBody.innerHTML = rows;
            
            loadData();
            
            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA'); 
            }, 1000);
        }

        function checkInput(el) {
            if (el.value.trim() !== "") {
                if(!el.classList.contains('has-content')) el.classList.add('has-content');
            } else {
                if(el.classList.contains('has-content')) el.classList.remove('has-content');
            }
            autoSave();
        }

        let timer;
        function autoSave() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                const data = [];
                tableBody.querySelectorAll('tr').forEach((row, rowIndex) => {
                    const inputs = Array.from(row.querySelectorAll('input')).map(i => i.value);
                    // حفظ السطر مع رقم السطر الخاص فيه عشان ما يضيع مكانه
                    if (inputs.some(v => v.trim() !== "")) {
                        data.push({ id: rowIndex, values: inputs });
                    }
                });
                
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                
                saveTag.style.opacity = "1";
                setTimeout(() => saveTag.style.opacity = "0", 1200);
            }, 300);
        }

        function loadData() {
            const savedRaw = localStorage.getItem(DB_KEY);
            if (savedRaw) {
                const savedData = JSON.parse(savedRaw);
                const rows = tableBody.querySelectorAll('tr');
                savedData.forEach(item => {
                    // التأكد من استرجاع البيانات للسطر الصحيح بالضبط
                    if (item && item.id !== undefined && rows[item.id]) {
                        const inputs = rows[item.id].querySelectorAll('input');
                        item.values.forEach((val, i) => { 
                            if(inputs[i]) {
                                inputs[i].value = val;
                                checkInput(inputs[i]); 
                            }
                        });
                    }
                });
            }
        }

        function sendToWhatsApp() {
            const savedRaw = localStorage.getItem(DB_KEY);
            if (!savedRaw || JSON.parse(savedRaw).length === 0) {
                alert("السجل فارغ! فضلاً أدخل بعض البيانات أولاً.");
                return;
            }

            const savedData = JSON.parse(savedRaw);
            let message = "📦 *نسخة احتياطية مشفرة - أكاديمية القحمة* 📦\n\n";
            
            savedData.forEach(item => {
                let rowNum = item.id + 1; // رقم السطر
                let vals = item.values;
                let name = vals[0] || '---';
                let date = vals[1] || '---';
                let fees = vals[2] || '---';
                let level = vals[3] || '---';
                let health = vals[4] || '---';
                let phone = vals[5] || '---';
                
                message += `[رقم ${rowNum}] ${name} | ${date} | ${fees} | ${level} | ${health} | ${phone}\n`;
            });

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/966552593113?text=${encodedMessage}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
