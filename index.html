<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية القحمة | النظام الذكي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d5a;
            --accent-gold: #ffd700;
            --whatsapp-green: #25D366;
            --filled-green: #e8f5e9;
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }

        body { display: flex; flex-direction: column; }

        .main-header {
            background: linear-gradient(180deg, var(--primary-blue) 0%, #001a35 100%);
            color: white; text-align: center; padding: 15px 10px;
            flex-shrink: 0; z-index: 2000; border-bottom: 4px solid var(--accent-gold);
        }

        .main-header img { width: 75px; height: auto; margin-bottom: 5px; }
        .main-header h1 { font-size: 22px; margin: 0; font-weight: 900; }

        .info-row { display: flex; justify-content: center; gap: 15px; margin-top: 5px; font-size: 12px; }
        .loc { color: var(--accent-gold); font-weight: bold; }

        #save-tag { font-size: 11px; color: #4ade80; height: 14px; margin-top: 3px; opacity: 0; transition: 0.3s; }

        .scroll-container { flex-grow: 1; overflow: auto; width: 100%; }

        table { border-collapse: collapse; min-width: 1100px; background: white; }

        thead th {
            position: sticky; top: 0; background: #fff; color: var(--primary-blue);
            padding: 15px 10px; font-size: 14px; font-weight: 900;
            border-bottom: 3px solid #eee; z-index: 1000;
        }

        td { border: 1px solid #edf2f7; padding: 0; }

        input {
            width: 100%; height: 50px; border: none; padding: 0 10px;
            text-align: center; font-size: 15px; font-family: 'Cairo';
            outline: none; background: transparent; transition: background-color 0.3s;
        }

        input.has-content { background-color: var(--filled-green); }
        input:focus { background: #fffdf2 !important; border-bottom: 3px solid var(--primary-blue); }

        .index-cell {
            background: #f8fafc; width: 45px; font-weight: bold;
            color: var(--primary-blue); text-align: center;
            position: sticky; right: 0; z-index: 500; border-left: 2px solid #eee;
        }

        /* زر الواتساب بعد التصغير */
        .whatsapp-btn {
            position: fixed; bottom: 15px; left: 15px;
            background-color: var(--whatsapp-green);
            color: white; border: none; padding: 10px 18px; /* تم تصغير الحشوة */
            border-radius: 30px; font-family: 'Cairo'; font-size: 13px; /* تم تصغير الخط */
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 3000; display: flex; align-items: center; gap: 6px;
            transition: 0.3s; text-decoration: none;
        }

        .whatsapp-btn:hover { transform: scale(1.05); background-color: #128C7E; }

    </style>
</head>
<body>

    <header class="main-header">
        <img src="https://i.ibb.co/QF1mKFpn/IMG-8418.png" alt="Logo">
        <h1>أكاديمية القحمة الرياضية</h1>
        <div class="info-row">
            <div>📍 <span class="loc">ملعب الخيرية بالقحمة</span></div>
            <div>⏰ <span id="clock">00:00:00</span></div>
            <div>☀️ <span>صافي 28°C</span></div>
        </div>
        <div id="save-tag">✓ تم الحفظ للنسخة النهائية</div>
    </header>

    <main class="scroll-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th style="width: 45px; right: 0; position: sticky; z-index: 1100; background: #fff;">م</th>
                    <th>الاسم الكامل</th>
                    <th>التاريخ</th>
                    <th>الرسوم</th>
                    <th>المرحلة</th>
                    <th>الحالة</th>
                    <th>رقم الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </main>

    <a href="#" class="whatsapp-btn" onclick="sendToWhatsApp()">
        <span>🟢 إرسال للواتساب</span>
    </a>

    <script>
        const tableBody = document.getElementById('tableBody');
        const saveTag = document.getElementById('save-tag');
        
        // هذا هو "المفتاح الأبدي" - طالما هذا الاسم ما تغير في الكود، البيانات ما تنحذف
        const DB_KEY = 'ALQAHMA_PERMANENT_DB_FINAL'; 

        function init() {
            let rows = '';
            for (let i = 1; i <= 100; i++) {
                rows += `
                    <tr>
                        <td class="index-cell">${i}</td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                        <td><input type="text" oninput="checkInput(this)" placeholder="..."></td>
                    </tr>
                `;
            }
            tableBody.innerHTML = rows;
            loadData();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA'); }, 1000);
        }

        function checkInput(el) {
            if (el.value.trim() !== "") {
                el.classList.add('has-content');
            } else {
                el.classList.remove('has-content');
            }
            autoSave();
        }

        let timer;
        function autoSave() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                const data = [];
                tableBody.querySelectorAll('tr').forEach(row => {
                    const inputs = Array.from(row.querySelectorAll('input')).map(i => i.value);
                    if (inputs.some(v => v.trim() !== "")) data.push(inputs);
                });
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                saveTag.style.opacity = "1";
                setTimeout(() => saveTag.style.opacity = "0", 1000);
            }, 500);
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem(DB_KEY));
            if (saved) {
                const rows = tableBody.querySelectorAll('tr');
                saved.forEach((rowData, index) => {
                    if (rows[index]) {
                        const inputs = rows[index].querySelectorAll('input');
                        rowData.forEach((val, i) => { 
                            if(inputs[i]) {
                                inputs[i].value = val;
                                checkInput(inputs[i]);
                            }
                        });
                    }
                });
            }
        }

        function sendToWhatsApp() {
            const saved = JSON.parse(localStorage.getItem(DB_KEY));
            if (!saved || saved.length === 0) {
                alert("السجل فارغ! فضلاً أدخل بعض البيانات أولاً.");
                return;
            }

            let message = "🏆 *كشف أسماء أكاديمية القحمة الرياضية* 🏆\n\n";
            saved.forEach((row, index) => {
                message += `${index + 1}- *الاسم:* ${row[0] || '---'} | *الجوال:* ${row[6] || '---'}\n`;
            });

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/966552593113?text=${encodedMessage}`, '_blank');
        }

        init();
    </script>
</body>
</html>
