<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية القحمة الرياضية | النظام الإداري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d5a;
            --accent-gold: #ffd700;
            --white: #ffffff;
            --text-gray: #f1f5f9;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        /* --- الهيدر الرئيسي (ثابت في قمة الصفحة) --- */
        .main-header {
            background: linear-gradient(180deg, var(--primary-blue) 0%, #001a35 100%);
            color: white;
            text-align: center;
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 2000; /* أعلى طبقة */
            border-bottom: 4px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-header img {
            width: 85px;
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .main-header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 900;
        }

        /* --- شريط المعلومات (الساعة، الطقس، الموقع) --- */
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-text { color: var(--accent-gold); font-weight: bold; }

        #save-status {
            font-size: 12px;
            color: #4ade80;
            height: 15px;
            margin-top: 5px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
        }

        /* --- عناوين الجدول (ثابتة تحت الهيدر مباشرة) --- */
        .table-container {
            width: 100%;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 900px;
        }

        thead th {
            position: sticky;
            top: 195px; /* يثبت تحت الهيدر تماماً (تعدل حسب حجم الهيدر) */
            background-color: #ffffff;
            color: var(--primary-blue);
            padding: 15px 5px;
            font-size: 14px;
            font-weight: 900;
            border-bottom: 3px solid #ddd;
            z-index: 1500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* لضمان ثبات العناوين في الجوال والحاسوب */
        @media screen and (max-width: 768px) {
            thead th { top: 220px; } 
            .main-header h1 { font-size: 20px; }
        }

        /* --- صفوف الجدول --- */
        td {
            border-bottom: 1px solid #f1f5f9;
            padding: 0;
            background: white;
        }

        input {
            width: 100%;
            height: 50px;
            border: none;
            padding: 0 10px;
            text-align: center;
            font-size: 15px;
            font-family: 'Cairo';
            background: transparent;
            outline: none;
        }

        input:focus {
            background: #fffdf0;
            border-bottom: 3px solid var(--primary-blue);
        }

        .num-col {
            background: #f8fafc;
            width: 45px;
            font-weight: bold;
            color: var(--primary-blue);
            text-align: center;
        }

        tr:hover td { background-color: #f1f7ff; }

    </style>
</head>
<body>

    <header class="main-header">
        <img src="https://i.ibb.co/QF1mKFpn/IMG-8418.png" alt="Logo">
        <h1>أكاديمية القحمة الرياضية</h1>
        
        <div class="info-bar">
            <div class="info-item">📍 <span class="location-text">ملعب الخيرية بالقحمة</span></div>
            <div class="info-item">⏰ <span id="digital-clock">00:00:00</span></div>
            <div class="info-item">☀️ <span id="weather-temp">28°C - صافي</span></div>
        </div>

        <div id="save-status">✓ تم الحفظ تلقائياً</div>
    </header>

    <div class="table-container">
        <table id="playersTable">
            <thead>
                <tr>
                    <th style="width: 45px;">م</th>
                    <th>اسم اللاعب</th>
                    <th>تاريخ التسليم</th>
                    <th>الرسوم</th>
                    <th>المرحلة الدراسية</th>
                    <th>الحالة الصحية</th>
                    <th>رقم الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const tableBody = document.getElementById('tableBody');
        const saveStatus = document.getElementById('save-status');
        const STORAGE_KEY = 'ALQAHMA_FINAL_ULTRA_V1';

        // 1. توليد الصفوف
        function init() {
            let html = '';
            for (let i = 1; i <= 100; i++) {
                html += `
                    <tr>
                        <td class="num-col">${i}</td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                        <td><input type="text" oninput="save()" placeholder="..."></td>
                    </tr>
                `;
            }
            tableBody.innerHTML = html;
            load();
            startClock();
        }

        // 2. الساعة الرقمية
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ar-SA');
            }, 1000);
        }

        // 3. حفظ تلقائي (أبدي)
        let timer;
        function save() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                const data = [];
                tableBody.querySelectorAll('tr').forEach(row => {
                    const vals = Array.from(row.querySelectorAll('input')).map(i => i.value);
                    if (vals.some(v => v.trim() !== "")) data.push(vals);
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                saveStatus.style.opacity = "1";
                setTimeout(() => { saveStatus.style.opacity = "0"; }, 1000);
            }, 500);
        }

        // 4. استعادة البيانات
        function load() {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (saved) {
                const rows = tableBody.querySelectorAll('tr');
                saved.forEach((rowData, index) => {
                    if (rows[index]) {
                        const inputs = rows[index].querySelectorAll('input');
                        rowData.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                    }
                });
            }
        }

        init();
    </script>
</body>
</html>
