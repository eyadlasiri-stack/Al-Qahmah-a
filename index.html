<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية القحمة - سجل احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #0056b3;
            --bg-light: #f4f9ff;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0; /* إلغاء الحواف ليكون الانزلاق كامل */
        }

        .container {
            max-width: 100%; /* جعل العرض كامل الشاشة */
            margin: auto;
            background: var(--white);
            min-height: 100vh;
        }

        /* هيدر ثابت أو عادي حسب رغبتك، هنا جعلته مريح */
        .header-section {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-section h1 { margin: 0; font-size: 24px; }
        
        #autoSaveStatus {
            font-size: 14px;
            color: #4ade80; /* أخضر فاتح */
            margin-top: 5px;
            height: 20px;
            opacity: 0;
            transition: 0.3s;
        }

        /* الجدول الآن بدون scroll داخلي، ينزل مع الصفحة */
        .table-container {
            width: 100%;
            overflow-x: auto; /* للسماح بالتمرير الجانبي فقط في الجوال */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        /* العناوين تثبت في أعلى المتصفح عند النزول */
        thead th {
            position: sticky;
            top: 0; /* هذا هو السر، يثبت مع نزول الصفحة */
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 10px;
            z-index: 1000;
            border: 1px solid #00264d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        td { border: 1px solid #eee; padding: 0; }

        input {
            width: 100%;
            height: 55px; /* خانات واسعة ومريحة */
            border: none;
            padding: 0 15px;
            text-align: center;
            font-size: 16px;
            font-family: 'Cairo';
            background-color: transparent;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            background-color: #fffde7;
            border-bottom: 4px solid var(--accent-blue);
        }

        tr:nth-child(even) { background-color: #fcfdfe; }
        tr:hover { background-color: #f1f7ff; }

        /* منطقة الأزرار في الأسفل */
        .footer-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
        }

        .export-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-family: 'Cairo';
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .export-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>أكاديمية القحمة الرياضية</h1>
        <div id="autoSaveStatus">✓ تم الحفظ تلقائياً</div>
    </div>

    <div class="table-container">
        <table id="playersTable">
            <thead>
                <tr>
                    <th style="width: 50px;">م</th>
                    <th>اسم اللاعب</th>
                    <th>تاريخ التسليم</th>
                    <th>الرسوم</th>
                    <th>المرحلة الدراسية</th>
                    <th>الحالة الصحية</th>
                    <th>رقم الجوال</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="footer-bar">
    <button class="export-btn" onclick="exportToExcel()">📊 تصدير Excel</button>
</div>

<script>
    const tableBody = document.getElementById('tableBody');
    const autoSaveStatus = document.getElementById('autoSaveStatus');

    function generateRows() {
        let rowsHtml = '';
        for (let i = 1; i <= 100; i++) {
            rowsHtml += `
                <tr>
                    <td style="background:#f1f1f1; font-weight:bold; text-align:center; color:#003366;">${i}</td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                    <td><input type="text" oninput="autoSave()" placeholder="..."></td>
                </tr>
            `;
        }
        tableBody.innerHTML = rowsHtml;
    }

    let saveTimeout;
    function autoSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const rows = document.querySelectorAll('#tableBody tr');
            const allData = [];
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const rowData = Array.from(inputs).map(input => input.value);
                if (rowData.some(val => val.trim() !== "")) {
                    allData.push(rowData);
                }
            });
            localStorage.setItem('qahmah_final_scroll', JSON.stringify(allData));
            autoSaveStatus.style.opacity = "1";
            setTimeout(() => { autoSaveStatus.style.opacity = "0"; }, 1000);
        }, 500);
    }

    window.onload = function() {
        generateRows();
        const saved = JSON.parse(localStorage.getItem('qahmah_final_scroll'));
        if (saved) {
            const rows = document.querySelectorAll('#tableBody tr');
            saved.forEach((rowData, index) => {
                if (rows[index]) {
                    const inputs = rows[index].querySelectorAll('input');
                    rowData.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                }
            });
        }
    };

    function exportToExcel() {
        let table = document.getElementById("playersTable");
        let template = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" lang="ar"><head><meta charset="utf-8"><style>table{direction:rtl; border:1px solid #ccc;} th{background:#003366; color:#fff; padding:10px;} td{border:1px solid #eee; text-align:center; padding:5px;}</style></head><body>${table.outerHTML}</body></html>`;
        let url = 'data:application/vnd.ms-excel;charset=utf-8,' + encodeURIComponent(template);
        let link = document.createElement("a");
        link.href = url;
        link.download = "سجل_اكاديمية_القحمة.xls";
        link.click();
    }
</script>

</body>
</html>
